upstream gateway_auth { server gateway-auth:8000; }
upstream auditoria_svc { server auditoria-svc:8003; }
upstream prestamos_svc { server prestamos-svc:8002; }
upstream sync_svc { server sync-svc:8004; }

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/v1/auth/ {
        proxy_pass http://gateway_auth/api/v1/auth/;
        proxy_set_header Host $host;
    }

    location /api/v1/auditoria/ {
        proxy_pass http://auditoria_svc/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/v1/prestamos/ {
        proxy_pass http://prestamos_svc/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/v1/sync/ {
        proxy_pass http://sync_svc/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /dashboard/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
