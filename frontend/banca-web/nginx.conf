upstream gateway_auth { server gateway-auth:8000; }
upstream cuentas_svc { server cuentas-svc:8001; }
upstream prestamos_svc { server prestamos-svc:8002; }

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /api/v1/auth/ {
        proxy_pass http://gateway_auth/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/cuentas/ {
        proxy_pass http://cuentas_svc/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/v1/prestamos/ {
        proxy_pass http://prestamos_svc/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
    }

    location /web/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
