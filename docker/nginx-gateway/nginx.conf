upstream gateway_auth { server gateway-auth:8000; }
upstream cuentas_svc { server cuentas-svc:8001; }
upstream prestamos_svc { server prestamos-svc:8002; }
upstream auditoria_svc { server auditoria-svc:8003; }
upstream sync_svc { server sync-svc:8004; }
upstream banca_web { server banca-web:80; }
upstream cajas_web { server cajas-web:80; }
upstream dashboard_web { server dashboard-sbs:80; }

server {
    listen 80;
    client_max_body_size 10m;

    location /api/v1/auth/ {
        proxy_pass http://gateway_auth/api/v1/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/cuentas/ {
        proxy_pass http://cuentas_svc/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/v1/prestamos/ {
        proxy_pass http://prestamos_svc/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/v1/auditoria/ {
        proxy_pass http://auditoria_svc/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /api/v1/sync/ {
        proxy_pass http://sync_svc/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    location /web/ {
        proxy_pass http://banca_web/web/;
        proxy_set_header Host $host;
    }

    location /cajas/ {
        proxy_pass http://cajas_web/cajas/;
        proxy_set_header Host $host;
    }

    location /dashboard/ {
        proxy_pass http://dashboard_web/dashboard/;
        proxy_set_header Host $host;
    }

    location = / {
        root /usr/share/nginx/demo;
        try_files /index.html =404;
    }

    location = /lab {
        return 302 /lab/;
    }

    location /lab/ {
        alias /usr/share/nginx/lab/;
        index index.html;
    }
}
