groups:
  - name: cooperativa_core_alerts
    rules:
      - alert: CoreDatabaseDown
        expr: pg_up == 0
        for: 30s
        labels:
          severity: critical
          servidor: SRV-CoreBancario
        annotations:
          summary: "Core Bancario PostgreSQL no responde"
          description: "El servidor core-db está caído. Activar procedimiento de failover hacia SRV-Contingencia (MongoDB)."
          accion: "Consultar contingencia_coop.transacciones_respaldo en MongoDB"

      - alert: CoreHighConnections
        expr: pg_stat_activity_count > 50
        for: 2m
        labels:
          severity: warning
          servidor: SRV-CoreBancario
        annotations:
          summary: "Alto número de conexiones al Core"
          description: "Más de 50 conexiones activas. Verificar carga de sedes regionales."

      - alert: ReplicationLag
        expr: pg_replication_lag > 30
        for: 1m
        labels:
          severity: warning
          servidor: SRV-Backup
        annotations:
          summary: "Retraso de replicación superior a 30 segundos"
          description: "La réplica SRV-Backup presenta lag. Consultas regionales pueden mostrar datos desactualizados."

      - alert: CoreDatabaseRecovered
        expr: pg_up == 1
        for: 1m
        labels:
          severity: info
          servidor: SRV-CoreBancario
        annotations:
          summary: "Core Bancario recuperado"
          description: "PostgreSQL Core vuelve a estar operativo. Desactivar modo contingencia."
